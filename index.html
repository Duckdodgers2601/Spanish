      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;

      text-align: center;
      color: white;

    .container {

      margin-bottom: 20px;
    }

    p {
      font-size: 20px;

    .btn {
      background: white;
      color: #333;
      padding: 15px 40px;
      font-size: 20px;
      border-radius: 10px;

      transition: 0.3s;
      font-weight: bold;
    }

    .btn:hover {
      background: #ffdd57;
      transform: scale(1.05);
    }
